name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [staging, main]
  schedule:
    - cron: '0 2 * * *'

jobs:
  ci:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile
      - run: bun typecheck
      - run: bun lint

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun audit --audit-level high --prod --ignore GHSA-v39h-62p7-jpjc --ignore GHSA-q3j6-qgpj-74h6 --ignore GHSA-7f6v-3gx7-27q8