name: Deploy Staging

on:
  push:
    branches: [staging]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      - name: Migrate staging database
        run: bun db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
          NODE_OPTIONS: "--experimental-vm-modules"

      - name: Deploy to Vercel staging
        run: |
          bunx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          bunx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          bunx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.STAGING_VERCEL_PROJECT_ID }}